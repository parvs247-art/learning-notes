<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lists-- HTML tutorial</title>
</head>
<body>
    <h1>Lists in HTML</h1>
    <!-- ordered lists-->
     <h2>Ordered Lists</h2>
     <ol>
        <li>First item</li>
        <li>Second item</li>
        <li>Third item</li>
     </ol>
        <!-- unordered lists-->
        <h2>Unordered Lists</h2>
     <ul>
        <li>First item</li>
        <li>Second item</li>
        <li>Third item</li>
     </ul>
     <h3>Definition Lists</h3>
     <dl>
        <dt>HTML</dt>
        <dd>HyperText Markup Language</dd>
        <dt>CSS</dt>
        <dd>Cascading Style Sheets</dd>
        <dt>JS</dt>
        <dd>JavaScript</dd>
     </dl>
</body>
</html>
