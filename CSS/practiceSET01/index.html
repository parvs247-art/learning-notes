<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            height: 200px;
            width: 200px;
            border-radius: 50%;
            border: 20px solid #F1EDEE;
            border-top: 20px solid #db5461;
            
            animation: loader 1s ease-in-out 0s infinite normal;
        }
        @keyframes loader{
            0%{
                transform: rotate(0deg);
            }
            100%{
                transform: rotate(360deg);
            }
        }
    </style>
</head>
<body>
    <!-- create a simple loader using css -->
<div></div>

</body>
</html>
